
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap');
  
  * { box-sizing: border-box; margin: 0; padding: 0; }

  .container {
    font-family: 'DM Sans', sans-serif;
    padding: 2rem 1.5rem 2rem;
    max-width: 720px;
  }

  .phase {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 0 1.5rem;
    margin-bottom: 0;
  }

  .date-col {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    padding-top: 18px;
  }

  .date-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--color-text-tertiary);
    text-align: right;
    line-height: 1.3;
  }

  .line-col {
    display: flex;
    flex-direction: column;
  }

  .phase-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-radius: var(--border-radius-lg);
    cursor: pointer;
    transition: background 0.15s;
    border: 0.5px solid transparent;
    position: relative;
  }

  .phase-header:hover {
    background: var(--color-background-secondary);
    border-color: var(--color-border-tertiary);
  }

  .phase-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .phase-title {
    font-size: 15px;
    font-weight: 500;
    color: var(--color-text-primary);
    flex: 1;
  }

  .phase-subtitle {
    font-size: 12px;
    color: var(--color-text-secondary);
    margin-top: 2px;
  }

  .chevron {
    font-size: 11px;
    color: var(--color-text-tertiary);
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .chevron.open { transform: rotate(90deg); }

  .tasks-wrapper {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.3s ease;
  }

  .tasks-wrapper.open {
    max-height: 600px;
  }

  .tasks {
    padding: 4px 16px 12px 36px;
  }

  .task {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 5px 0;
    font-size: 13px;
    color: var(--color-text-secondary);
    line-height: 1.5;
  }

  .task-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 7px;
    background: var(--color-border-secondary);
  }

  .connector {
    width: 0.5px;
    background: var(--color-border-tertiary);
    flex: 1;
    min-height: 8px;
    align-self: stretch;
    margin: 0 auto;
    position: relative;
    left: 4px;
  }

  .tag {
    display: inline-block;
    font-size: 10px;
    font-weight: 500;
    padding: 2px 7px;
    border-radius: 20px;
    letter-spacing: 0.03em;
    margin-left: 6px;
    vertical-align: middle;
  }

  .tag-now { background: #FAEEDA; color: #854F0B; }
  .tag-urgent { background: #FCEBEB; color: #A32D2D; }
  @media (prefers-color-scheme: dark) {
    .tag-now { background: #633806; color: #FAC775; }
    .tag-urgent { background: #791F1F; color: #F7C1C1; }
  }
</style>

<div class="container">

<script>
const phases = [
  {
    date: "Mar–Apr\n2026",
    color: "#1D9E75",
    title: "Research & exploration",
    subtitle: "Cast wide, get oriented",
    tag: null,
    tasks: [
      "Identify 8–12 programs that fit your interests and strengths",
      "Learn what sub-fields excite you — read recent papers in those areas",
      "Understand the difference between programs (PhD vs. MS, funded vs. unfunded)",
      "Talk to grad students or recent alumni about their experience",
      "Audit your undergraduate transcript and note any weak spots to address"
    ]
  },
  {
    date: "May–Jun\n2026",
    color: "#1D9E75",
    title: "Faculty identification",
    subtitle: "The most important step",
    tag: null,
    tasks: [
      "For each program, identify 2–4 faculty whose research aligns with yours",
      "Read their 3 most recent papers — take notes on their methods and questions",
      "Check if they are actively advising students (lab websites, Google Scholar activity)",
      "Shortlist 20–30 faculty across all target programs",
      "Note funding sources and any listed availability for new PhD students"
    ]
  },
  {
    date: "Jul\n2026",
    color: "#378ADD",
    title: "Materials prep begins",
    subtitle: "Statement of purpose drafting",
    tag: null,
    tasks: [
      "Draft a personal statement — focus on research narrative, not biography",
      "Identify 3 recommenders and have a preliminary conversation with each",
      "Begin outlining your research interests in writing (helps clarify your thinking)",
      "Gather transcripts and check GRE requirements (many programs dropped them)",
      "Set up a spreadsheet to track programs, deadlines, and requirements"
    ]
  },
  {
    date: "Aug\n2026",
    color: "#378ADD",
    title: "Cold emails to faculty",
    subtitle: "Reach out before apps open",
    tag: null,
    tasks: [
      "Email 1–2 target faculty per week — keep it brief and specific",
      "Mention a specific paper of theirs and why your interests align",
      "Attach or link to any research work, thesis, or writing sample",
      "Do NOT mass email — personalization is everything here",
      "Track responses; no reply after 2 weeks = move on (they're busy)"
    ]
  },
  {
    date: "Sep\n2026",
    color: "#BA7517",
    title: "Recommendation letters",
    subtitle: "Give your writers time",
    tag: null,
    tasks: [
      "Formally request letters from your 3 recommenders now",
      "Send each recommender your CV, draft SOP, and key programs list",
      "Remind them of a specific project you worked on together",
      "Give a hard deadline at least 2 weeks before the earliest due date",
      "Continue refining your statement of purpose with peer feedback"
    ]
  },
  {
    date: "Oct\n2026",
    color: "#BA7517",
    title: "Applications open",
    subtitle: "Most portals go live now",
    tag: null,
    tasks: [
      "Create accounts on all application portals — do this early",
      "Finalize your program list (aim for 8–12: 2–3 reach, 5–6 target, 2–3 safe)",
      "Tailor your SOP for each program — mention specific faculty by name",
      "Request official transcripts from your registrar (allow 2–3 weeks)",
      "Prepare a writing sample if required (common in humanities/social science)"
    ]
  },
  {
    date: "Nov\n2026",
    color: "#D85A30",
    title: "Final push",
    subtitle: "Proofread everything twice",
    tag: null,
    tasks: [
      "Confirm recommenders have received their submission links and reminded if needed",
      "Have a professor or mentor review your final statement of purpose",
      "Submit applications for any Dec 1 early deadlines",
      "Double-check every program's specific requirements (word counts, formats)",
      "Begin preparing for potential writing tests or research proposals"
    ]
  },
  {
    date: "Dec\n2026",
    color: "#E24B4A",
    title: "Deadline month",
    subtitle: "Most programs due Dec 1–15",
    tag: "urgent",
    tasks: [
      "Submit all remaining applications — aim for 1 week before official deadlines",
      "Confirm all recommendation letters have been submitted",
      "Keep a copy of every submitted document for your records",
      "Breathe — the hard part is done; decisions come Jan–Mar",
      "Use downtime to prep for potential interviews (common in STEM fields)"
    ]
  }
];

function togglePhase(index) {
  const wrapper = document.getElementById('wrapper-' + index);
  const chevron = document.getElementById('chevron-' + index);
  const isOpen = wrapper.classList.contains('open');
  wrapper.classList.toggle('open', !isOpen);
  chevron.classList.toggle('open', !isOpen);
}

document.addEventListener('DOMContentLoaded', () => {
  const container = document.querySelector('.container');
  
  phases.forEach((phase, i) => {
    const isLast = i === phases.length - 1;
    
    const phaseEl = document.createElement('div');
    phaseEl.className = 'phase';
    
    const tagHTML = phase.tag
      ? `<span class="tag tag-${phase.tag}">${phase.tag === 'urgent' ? 'deadlines' : phase.tag}</span>`
      : '';
    
    phaseEl.innerHTML = `
      <div class="date-col">
        <span class="date-label">${phase.date}</span>
        ${!isLast ? `<div class="connector"></div>` : ''}
      </div>
      <div class="line-col">
        <div class="phase-header" onclick="togglePhase(${i})">
          <div class="phase-dot" style="background: ${phase.color}"></div>
          <div style="flex:1">
            <div class="phase-title">${phase.title}${tagHTML}</div>
            <div class="phase-subtitle">${phase.subtitle}</div>
          </div>
          <span class="chevron" id="chevron-${i}">▶</span>
        </div>
        <div class="tasks-wrapper" id="wrapper-${i}">
          <div class="tasks">
            ${phase.tasks.map(t => `
              <div class="task">
                <div class="task-dot"></div>
                <span>${t}</span>
              </div>
            `).join('')}
          </div>
        </div>
        ${!isLast ? `<div style="height: 4px"></div>` : ''}
      </div>
    `;
    
    container.appendChild(phaseEl);
  });
  
  // Auto-open first phase
  togglePhase(0);
});
</script>

</div>
