  .b-target  { background: #E0F2FE; color: #0C4A6E; }

  .b-eco     { background: #E0F2FE; color: #0C4A6E; }

let activeFilter = 'all', openCard = null;

function renderPrograms() {
  const container = document.getElementById('programs');
  const filtered = programs.filter(p => {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'standout') return p.standout || p.faculty.some(f => f.standout);
    if (activeFilter === 'ca') return p.ca;
    return p.tier === activeFilter;
  });
  if (!filtered.length) { container.innerHTML = '<div class="no-results">No programs match this filter.</div>'; return; }
  container.innerHTML = '';
  const tierLabels = { reach: 'Reach', target: 'Target', safe: 'Likely admit' };
  const tierClass  = { reach: 'b-reach', target: 'b-target', safe: 'b-safe' };
  filtered.forEach((p, i) => {
    const id = 'card-' + i;
    const hasStandout = p.standout || p.faculty.some(f => f.standout);
    const card = document.createElement('div');
    card.className = 'card' + (hasStandout ? ' is-standout' : '');
    card.innerHTML = `
      <div class="card-top" onclick="toggle('${id}')">
        <div class="card-left">
          <div class="school-name">${p.school}</div>
          <div class="program-name">${p.program}</div>
          <div class="badges">
            <span class="badge ${tierClass[p.tier]}">${tierLabels[p.tier]}</span>
            <span class="badge ${p.ca ? 'b-ca' : 'b-us'}">${p.ca ? 'California' : 'Out of state'}</span>
            ${hasStandout ? '<span class="badge b-standout">Standout</span>' : ''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span class="meta">${p.location}</span>
          <span class="chevron" id="chev-${id}">▶</span>
        </div>
      </div>
      <div class="card-detail" id="${id}">
        <div class="detail-section"><div class="detail-label">Why this program</div><div class="detail-text">${p.why}</div></div>
        <div class="detail-section"><div class="detail-label">Fit for your interests</div><div class="detail-text">${p.fit}</div></div>
        <div class="detail-section">
          <div class="detail-label">Faculty to research</div>
          <div class="faculty-list">
            ${p.faculty.map(f => `<div class="faculty-item${f.standout ? ' is-standout-faculty' : ''}"><span class="faculty-name">${f.name}${f.standout ? ' ✦' : ''}</span> — ${f.focus}${f.standout && f.reason ? `<div class="standout-reason">${f.reason}</div>` : ''}</div>`).join('')}
          </div>
        </div>
      </div>`;
    container.appendChild(card);
  });
}

function toggle(id) {
  const detail = document.getElementById(id), chev = document.getElementById('chev-' + id);
  const isOpen = detail.classList.contains('open');
  if (openCard && openCard !== id) {
    document.getElementById(openCard).classList.remove('open');
    document.getElementById('chev-' + openCard).classList.remove('open');
  }
  detail.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
  openCard = !isOpen ? id : null;
}

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.matches('.filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.dataset.filter;
  openCard = null;
  renderPrograms();
});

renderPrograms();
</script>
