<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculty Outreach Priority List</title>
<link rel="stylesheet" href="style.css">
<style>
  .faculty-list { display: flex; flex-direction: column; gap: 8px; }
  .card-row { display: flex; align-items: flex-start; gap: 10px; justify-content: space-between; }
  .rank-pill { font-size: 11px; font-weight: 500; min-width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  .rank-1 { background: #E1F5EE; color: #085041; }
  .rank-2 { background: #E6F1FB; color: #0C447C; }
  .rank-3 { background: #F1EFE8; color: #444441; }
  @media (prefers-color-scheme: dark) {
    .rank-1 { background: #04342C; color: #9FE1CB; }
    .rank-2 { background: #042C53; color: #85B7EB; }
    .rank-3 { background: #2C2C2A; color: #B4B2A9; }
  }
  .card-main { flex: 1; min-width: 0; }
  .faculty-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
  .faculty-school { font-size: 12px; color: var(--color-text-secondary); margin-top: 1px; }
  .badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
  .reason-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 8px 10px; font-size: 12px; color: var(--color-text-secondary); line-height: 1.5; margin-bottom: 8px; }
  .detail-row { font-size: 12px; color: var(--color-text-secondary); line-height: 1.55; margin-bottom: 6px; }
  .detail-row:last-child { margin-bottom: 0; }
  .detail-key { font-weight: 500; color: var(--color-text-primary); }
</style>
</head>
<body>
<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Faculty outreach priority list</h1>
    <p class="page-subtitle">Ranked by match to ecohydrology / landscape ecology / climate change &nbsp;·&nbsp; Click any card to expand</p>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">All faculty</button>
    <button class="filter-btn" data-filter="ca">California</button>
    <button class="filter-btn" data-filter="eco">Ecohydrology</button>
    <button class="filter-btn" data-filter="land">Landscape ecology</button>
    <button class="filter-btn" data-filter="climate">Climate change</button>
    <button class="filter-btn" data-filter="standout">Standouts only</button>
  </div>

  <div id="list"></div>
</div>

<script>
const tagLabels = { eco:"Ecohydrology", land:"Landscape ecology", bio:"Biogeochemistry", remote:"Remote sensing", urban:"Urban ecology", climate:"Climate change" };
const tagClass  = { eco:"b-eco", land:"b-land", bio:"b-bio", remote:"b-remote", urban:"b-urban", climate:"b-ca" };

const faculty = [
  { name:"Kelly Caylor", school:"UC Santa Barbara — Geography", ca:true, standout:true, activeRecruiting:false, tags:["eco","land"], focus:"Ecohydrology of drylands, distributed environmental sensing, coupled social-environmental systems", whyFirst:"Your current research mentor. The single most direct relationship you have. If he's open to taking you as a PhD student, this is your #1 application.", approach:"You already have the relationship — this is a conversation about whether he's taking new students and whether he'd support your application. Have that conversation explicitly before anything else.", email:"caylor@ucsb.edu" },
  { name:"Monica Turner", school:"UW-Madison — Department of Integrative Biology", ca:false, standout:true, activeRecruiting:false, tags:["land","climate"], focus:"Landscape ecology, ecosystem ecology, fire dynamics, spatial heterogeneity, land-water interactions, climate change", whyFirst:"Wrote the textbook on landscape ecology. National Academy of Sciences member. Active lab with current PhD students as of 2024. If landscape ecology is central to your dissertation, no one in the US has more authority in the field.", approach:"Cold email referencing her Yellowstone work and land-water interaction research. Be specific about your landscape ecology angle. She gets a lot of email — make yours unusually focused.", email:"turnermg@wisc.edu" },
  { name:"Julia Jones", school:"Oregon State — College of Earth, Ocean & Atmospheric Sciences", ca:false, standout:true, activeRecruiting:false, tags:["eco","land","climate"], focus:"Hydrology, landscape ecology, disturbance ecology, biogeochemistry, forest-water interactions, climate change", whyFirst:"Decades of forest ecohydrology work at the H.J. Andrews LTER — one of the flagship long-term ecological research sites in the US. One of the most direct faculty matches on your list.", approach:"Reference her work on forest-water interactions and ecohydrological process modeling. Ask about current grad student openings and whether your interests in CA-adjacent forest systems fit her current projects.", email:"julia.jones@oregonstate.edu" },
  { name:"Alexandra Konings", school:"Stanford — Earth System Science", ca:true, standout:true, activeRecruiting:false, tags:["eco","remote","climate"], focus:"Remote sensing ecohydrology, plant water status, vegetation-water feedbacks, drought, climate change", whyFirst:"Runs the only lab in the world dedicated specifically to remote sensing ecohydrology at global scale. If you want to do satellite-based vegetation-water-climate work, this is your target.", approach:"Her lab page (koningslab.stanford.edu) lists current openings — check it first. Reference a specific paper on plant hydraulic failure or SMAP vegetation optical depth. Be clear about your methods background.", email:"akonings@stanford.edu" },
  { name:"Christina Tague", school:"UC Santa Barbara — Bren School", ca:true, standout:true, activeRecruiting:false, tags:["eco","climate"], focus:"Ecohydrology, watershed modeling, climate change impacts on water resources, RHESSys model", whyFirst:"Developed RHESSys, one of the most widely used landscape-scale watershed ecohydrology models in the world. Same campus as Caylor — a natural co-advisor or committee member. Her work is explicitly climate-change focused.", approach:"Given Caylor is at UCSB, reaching out to Tague is especially strategic — she could serve as a secondary advisor or committee member. Frame it as interest in both the Geography and Bren programs.", email:"tague@bren.ucsb.edu" },
  { name:"Michael Goulden", school:"UC Irvine — Earth System Science & EEB", ca:true, standout:true, activeRecruiting:false, tags:["eco","climate"], focus:"Terrestrial ecosystem carbon and water fluxes, climate change, wildfire, Southern CA grassland and shrubland ecohydrology, eddy covariance", whyFirst:"Runs the Loma Ridge Global Change Experiment — one of the only long-term climate manipulation experiments in Southern CA ecosystems, measuring carbon and water fluxes in direct response to climate change. Actively publishing in 2025 on CA wildfire and forest carbon.", approach:"Reference his Loma Ridge experiment or his 2024 paper on rising fire severity and tree cover loss in CA. Be explicit about your interest in Southern CA ecohydrology and climate change — that's the center of his field research.", email:"mgoulden@uci.edu" },
  { name:"Angela Rigden", school:"UC Irvine — Earth System Science", ca:true, standout:true, activeRecruiting:false, tags:["eco","remote","climate"], focus:"Ecohydrology, land-atmosphere interactions, plant physiology, evapotranspiration, climate change, remote sensing", whyFirst:"Assistant professor with ecohydrology explicitly in her Google Scholar keywords — one of the few early-career faculty with a direct ecohydrology + climate change + remote sensing profile. Active lab with current PhD students and recent publications on drought and evapotranspiration.", approach:"Reference her work on how climate change alters the water cycle and evapotranspiration. She's at an early career stage and likely more accessible than more senior faculty. Ask specifically about PhD openings in her lab.", email:"arigden@uci.edu" },
  { name:"David Breshears", school:"University of Arizona — School of Natural Resources & the Environment", ca:false, standout:true, activeRecruiting:false, tags:["eco","land","climate"], focus:"Dryland ecohydrology, plant-water relations, landscape-scale vegetation change, drought, climate impacts", whyFirst:"One of the most cited dryland ecohydrologists in the world. His 'global change-type drought' framework is foundational. U of A has an explicit Watershed Management & Ecohydrology PhD emphasis.", approach:"Reference his work on landscape-scale vegetation die-off and drought legacy effects. Ask specifically about the Watershed Management & Ecohydrology PhD track and whether he's taking students.", email:"dbreshears@arizona.edu" },
  { name:"William Anderegg", school:"University of Utah — School of Biological Sciences", ca:false, standout:true, activeRecruiting:false, tags:["eco","climate"], focus:"Climate change and forest ecosystems, drought-induced tree mortality, plant hydraulics, carbon cycling, biosphere-atmosphere feedbacks, nature-based climate solutions", whyFirst:"Blavatnik National Laureate, NSF Waterman Award winner, 32,000+ Google Scholar citations, actively publishing in Nature in 2025. One of the most celebrated climate-forest ecologists of his generation. Directly bridges ecohydrology (plant hydraulics, drought) and climate change (carbon cycling, forest mortality) at landscape to global scales.", approach:"Reference his recent 2025 Nature paper on nature-based climate solutions in forests, or his work on hydraulic diversity regulating ecosystem resilience during drought. Be explicit about how your ecohydrology interests connect to the climate-forest mortality side of his work.", email:"anderegg@utah.edu" },
  { name:"Kevin Bladon", school:"Oregon State — College of Forestry", ca:false, standout:true, activeRecruiting:true, tags:["eco","climate"], focus:"Forest ecohydrology, wildfire impacts on hydrology and water quality, watershed science, climate change", whyFirst:"Actively recruiting PhD students (check fews.forestry.oregonstate.edu). Well-funded NSF and USFS projects. Squarely in your subfield — fire-hydrology under climate change is directly translatable to CA work.", approach:"His lab page explicitly lists open positions. Email with CV, writing sample, and a specific statement about your interest in fire-hydrology or water quality post-disturbance. He asks for all of this upfront.", email:"kevin.bladon@oregonstate.edu" },
  { name:"Emily Bernhardt", school:"Duke — Nicholas School & Biology", ca:false, standout:true, activeRecruiting:false, tags:["eco","bio","climate"], focus:"Freshwater biogeochemistry, ecohydrology, stream ecology, climate change", whyFirst:"One of the most cited freshwater biogeochemists in the US. Highly active, well-funded lab. If your interests include stream-watershed biogeochemistry alongside hydrology and climate, this is your Duke target.", approach:"Reference her work on stream biogeochemistry and the Duke Forest watershed studies. Be specific about whether your interests lean toward the biogeochemistry side of ecohydrology — that's her main angle.", email:"emily.bernhardt@duke.edu" },
  { name:"M. Todd Walter", school:"Cornell — Biological & Environmental Engineering", ca:false, standout:true, activeRecruiting:false, tags:["eco","bio"], focus:"Ecohydrology, terrestrial biogeochemistry, environmental biophysics, water-climate modeling", whyFirst:"Cornell's leading ecohydrologist. Mentored James Knighton (now at UConn), demonstrating the caliber of his training pipeline. Cross-departmental Graduate Field structure gives you unusual flexibility.", approach:"Reference his work on ecohydrological separation or agro-ecology hydrology. Make clear you're applying to the Graduate Field, not a specific department. Ask about current lab capacity.", email:"mtw5@cornell.edu" },
  { name:"Jonathan Duncan", school:"Penn State — Ecosystem Science & Management", ca:false, standout:true, activeRecruiting:true, tags:["eco","bio"], focus:"Watershed ecohydrology, biogeochemistry, terrain analysis, water quality, watershed management", whyFirst:"Explicitly recruiting PhD students with active NSF funding. Direct subfield match. One of the clearest 'cold email now' opportunities on this list.", approach:"Email with CV and reference one of his open positions (NSF project on urban watershed biogeochemistry). He asks applicants to state which project they're interested in and include transcripts upfront.", email:"jmduncan@psu.edu" },
  { name:"Nancy Grimm", school:"Arizona State — School of Life Sciences", ca:false, standout:true, activeRecruiting:false, tags:["eco","urban","climate"], focus:"Biogeochemistry, urban ecohydrology, stream-groundwater interactions, climate adaptation in urban systems", whyFirst:"National Academy of Sciences member and one of the world's foremost urban ecosystem ecologists. If urban ecohydrology, climate adaptation, or the CAP LTER interests you, she's the person.", approach:"Be honest about whether urban systems are central to your interests — her lab is deeply embedded in the CAP LTER. Reference the long-term dataset and urban-natural systems framing specifically.", email:"nbgrimm@asu.edu" },
  { name:"Ryan Bailey", school:"Colorado State — Ecosystem Science & Sustainability", ca:false, standout:false, activeRecruiting:true, tags:["eco","land","climate"], focus:"Landscape modeling, watershed hydrology, soil-water-vegetation interactions, climate change impacts on water resources", whyFirst:"CSU's Watershed Science PhD is purpose-built for your interests. Bailey is part of a GDPE research team investigating how Rocky Mountain forest landscape changes impact water resources under climate change — a direct match.", approach:"Check his lab page for listed open positions. Include a statement of purpose, CV, and a clear statement of why the Landscape Modeling Lab and climate-water focus specifically.", email:"ryan.bailey@colostate.edu" },
  { name:"Travis Huxman", school:"UC Irvine — Ecology & Evolutionary Biology (Dept. Chair)", ca:true, standout:false, activeRecruiting:false, tags:["eco","climate"], focus:"Plant ecophysiology, ecohydrology, dryland ecosystem function, global change, carbon-water coupling in arid landscapes", whyFirst:"Active professor and Department Chair of EEB at UCI, with extensive publications on ecohydrology and climate-ecosystem interactions in dryland and semi-arid systems — the same landscape contexts as Southern CA.", approach:"Reference his work on the ecohydrological implications of woody plant encroachment or pulse-response dynamics in dryland ecosystems. Note that he is also Department Chair, so his bandwidth for new students may be limited — confirm availability before applying.", email:"huxman@uci.edu" },
  { name:"Philip Townsend", school:"UW-Madison — Forest & Wildlife Ecology", ca:false, standout:false, activeRecruiting:false, tags:["land","remote","climate"], focus:"Remote sensing of forest ecosystems, spectroscopy, landscape ecology, forest disturbance, carbon and water cycling", whyFirst:"Active professor at UW-Madison and Chair of the Graduate Programs Committee. Strong remote sensing and landscape ecology profile — a natural complement to Turner's lab and a bridge to climate-change forest monitoring.", approach:"Reference his imaging spectroscopy work on forest landscape structure and climate disturbance. Frame your interest as complementary to Turner's lab — Townsend is strong on the remote sensing side of landscape ecology.", email:"ptownsend@wisc.edu" },
  { name:"Dar Roberts", school:"UC Santa Barbara — Geography", ca:true, standout:false, activeRecruiting:false, tags:["land","remote"], focus:"Remote sensing of vegetation, ecology, ecophysiology, spectroscopy", whyFirst:"Same department as Caylor. If your work touches remote sensing or spectral ecology, Roberts is a natural co-advisor or committee member. Strong applied remote sensing capacity.", approach:"Strategic secondary contact alongside Caylor. Frame as interest in co-advised work bridging ecohydrology and remote sensing spectroscopy.", email:"dar@geog.ucsb.edu" },
  { name:"Greg Okin", school:"UCLA — Geography", ca:true, standout:false, activeRecruiting:false, tags:["eco","land","climate"], focus:"Dryland ecohydrology, dust, aeolian processes, land degradation, remote sensing, climate change", whyFirst:"Strong dryland ecohydrology presence at UCLA. Good if your interests span dryland systems, remote sensing-based land degradation, and climate change impacts.", approach:"Reference his work on dust emissions and dryland ecohydrology feedbacks. Be clear about whether dryland systems are a main interest — his lab has a distinctive aeolian ecology angle.", email:"okin@geog.ucla.edu" },
  { name:"Pamela Templer", school:"Boston University — Biology", ca:false, standout:false, activeRecruiting:false, tags:["eco","bio","climate"], focus:"Ecosystem ecology, biogeochemical cycling, climate change impacts, plant-microbial interactions", whyFirst:"Highly cited ecosystem ecologist. BU's Biogeoscience program is an underrated fit for ecohydrology-biogeochemistry-climate crossover work.", approach:"Reference her work on forest biogeochemistry and climate change — specifically the shift in growing-season dynamics. Be explicit about your interest in the Biogeoscience program's interdisciplinary structure.", email:"ptempler@bu.edu" },
  { name:"Peter McIntyre", school:"Cornell — Ecology & Evolutionary Biology", ca:false, standout:false, activeRecruiting:false, tags:["land","bio","climate"], focus:"Freshwater landscape ecology, limnology, climate change, aquatic biogeochemistry", whyFirst:"Strong freshwater landscape ecology presence at Cornell, complementing Walter's ecohydrology angle. Good if your interests include aquatic-terrestrial linkages and climate change impacts on freshwater systems.", approach:"Reference his freshwater landscape ecology work and ask whether your interests in landscape-watershed dynamics under climate change align with current lab directions.", email:"pbm32@cornell.edu" },
  { name:"Enrique Vivoni", school:"Arizona State — School of Geographical Sciences", ca:false, standout:false, activeRecruiting:false, tags:["eco","climate"], focus:"Dryland ecohydrology, hydrological modeling, land-atmosphere interactions, remote sensing of water cycle, climate change", whyFirst:"One of the leading quantitative ecohydrologists working on dryland systems and land-atmosphere feedbacks under climate change. Good if you want a computational ecohydrology training.", approach:"Reference his work on North American monsoon ecohydrology and distributed hydrologic modeling. Be specific about your interest in process-based modeling vs. field-based approaches.", email:"vivoni@asu.edu" },
  { name:"Drew Gronewold", school:"University of Michigan — SEAS", ca:false, standout:false, activeRecruiting:false, tags:["eco","climate"], focus:"Hydrological modeling, Great Lakes water resources, watershed-scale forecasting, Bayesian statistics, climate change", whyFirst:"Active associate professor at Michigan SEAS with NSF-funded research on transboundary waters and climate-driven hydrological change. Best fit for quantitative watershed modeling at landscape scales.", approach:"Reference his recent work on Great Lakes water balance and climate-driven hydrological variability. Be explicit about your interest in hydrological modeling and uncertainty quantification.", email:"drewgron@umich.edu" },
  { name:"Joan Iverson Nassauer", school:"University of Michigan — SEAS", ca:false, standout:false, activeRecruiting:false, tags:["land"], focus:"Landscape ecology, watershed infrastructure, urban biodiversity, stormwater, ecological design", whyFirst:"Active professor with current PhD students. Distinguished landscape ecologist with a unique angle on the design and policy dimensions of landscape patterns under climate change.", approach:"Reference her work on cultural sustainability of ecological landscapes and stormwater management. Be clear about whether the design-ecology interface interests you.", email:"nassauer@umich.edu" },
  { name:"James Knighton", school:"UConn — Natural Resources & the Environment", ca:false, standout:false, activeRecruiting:true, tags:["eco"], focus:"Ecohydrology, physical hydrology, ecohydrological separation, catchment-scale tree water uptake, isotope hydrology", whyFirst:"Runs a dedicated Ecohydrology Lab at UConn with active PhD students. A strong likely-admit option with direct subfield match.", approach:"His lab page lists current projects clearly. Reference his work on ecohydrological separation or catchment-scale isotope modeling. Storrs is small — address this honestly if it comes up.", email:"james.knighton@uconn.edu" }
];

function tierOf(f) {
  if (f.standout && f.ca) return "1";
  if (f.standout && f.activeRecruiting) return "1";
  if (f.standout) return "2";
  if (f.activeRecruiting) return "2";
  return "3";
}

const tiers = [
  { key:"1", label:"Contact first — highest priority", rankClass:"rank-1" },
  { key:"2", label:"Contact second — strong matches",  rankClass:"rank-2" },
  { key:"3", label:"Contact third — solid options",    rankClass:"rank-3" }
];

let activeFilter = 'all', openCard = null;

function render() {
  const list = document.getElementById('list');
  const filtered = faculty.filter(f => {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'ca') return f.ca;
    if (activeFilter === 'standout') return f.standout;
    return f.tags.includes(activeFilter);
  });
  if (!filtered.length) { list.innerHTML = '<div class="no-results">No faculty match this filter.</div>'; return; }

  list.innerHTML = '';
  tiers.forEach(tier => {
    const group = filtered.filter(f => tierOf(f) === tier.key);
    if (!group.length) return;

    const sectionEl = document.createElement('div');
    sectionEl.className = 'section-label';
    sectionEl.textContent = tier.label;
    list.appendChild(sectionEl);

    const groupEl = document.createElement('div');
    groupEl.className = 'faculty-list';
    group.forEach((f, i) => {
      const id = `fc-${tier.key}-${i}`;
      const card = document.createElement('div');
      card.className = 'card';
      const extraBadges = [
        f.ca ? '<span class="badge b-ca">California</span>' : '',
        f.standout ? '<span class="badge b-standout">Standout</span>' : '',
        f.activeRecruiting ? '<span class="badge b-active">Actively recruiting</span>' : ''
      ].filter(Boolean).join('');

      card.innerHTML = `
        <div class="card-row" onclick="toggle('${id}')">
          <div class="rank-pill ${tier.rankClass}">${tier.key}</div>
          <div class="card-main">
            <div class="faculty-name">${f.name}</div>
            <div class="faculty-school">${f.school}</div>
            <div class="badges">
              ${f.tags.map(t=>`<span class="badge ${tagClass[t]}">${tagLabels[t]}</span>`).join('')}
              ${extraBadges}
            </div>
          </div>
          <span class="chevron" id="chev-${id}">▶</span>
        </div>
        <div class="card-detail" id="${id}">
          <div class="reason-box">${f.whyFirst}</div>
          <div class="detail-row"><span class="detail-key">Research focus:</span> ${f.focus}</div>
          <div class="detail-row"><span class="detail-key">How to approach:</span> ${f.approach}</div>
          <div class="detail-row"><span class="detail-key">Email:</span> <a href="mailto:${f.email}">${f.email}</a></div>
        </div>`;
      groupEl.appendChild(card);
    });
    list.appendChild(groupEl);
  });
}

function toggle(id) {
  const detail = document.getElementById(id), chev = document.getElementById('chev-'+id);
  const isOpen = detail.classList.contains('open');
  if (openCard && openCard !== id) { document.getElementById(openCard).classList.remove('open'); document.getElementById('chev-'+openCard).classList.remove('open'); }
  detail.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
  openCard = !isOpen ? id : null;
}

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.matches('.filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.dataset.filter;
  openCard = null;
  render();
});

render();
</script>
</body>
</html>
