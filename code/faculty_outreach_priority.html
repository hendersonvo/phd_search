<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faculty Outreach Priority List</title>
<link rel="stylesheet" href="style.css">
<style>
  .faculty-list { display: flex; flex-direction: column; gap: 8px; }
  .card-row { display: flex; align-items: flex-start; gap: 10px; justify-content: space-between; }
  .rank-pill {
    font-size: 11px;
    font-weight: 500;
    min-width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .rank-1 { background: #E1F5EE; color: #085041; }
  .rank-2 { background: #E6F1FB; color: #0C447C; }
  .rank-3 { background: #F1EFE8; color: #444441; }
  @media (prefers-color-scheme: dark) {
    .rank-1 { background: #04342C; color: #9FE1CB; }
    .rank-2 { background: #042C53; color: #85B7EB; }
    .rank-3 { background: #2C2C2A; color: #B4B2A9; }
  }
  .card-main { flex: 1; min-width: 0; }
  .faculty-name { font-size: 14px; font-weight: 500; color: var(--color-text-primary); }
  .faculty-school { font-size: 12px; color: var(--color-text-secondary); margin-top: 1px; }
  .badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 5px; }
  .reason-box {
    background: var(--color-background-secondary);
    border-radius: var(--border-radius-md);
    padding: 8px 10px;
    font-size: 12px;
    color: var(--color-text-secondary);
    line-height: 1.5;
    margin-bottom: 8px;
  }
  .detail-row { font-size: 12px; color: var(--color-text-secondary); line-height: 1.55; margin-bottom: 6px; }
  .detail-row:last-child { margin-bottom: 0; }
  .detail-key { font-weight: 500; color: var(--color-text-primary); }
</style>
</head>
<body>
<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">Faculty outreach priority list</h1>
    <p class="page-subtitle">Ranked by match to ecohydrology / landscape ecology &nbsp;·&nbsp; Click any card to expand</p>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">All faculty</button>
    <button class="filter-btn" data-filter="ca">California</button>
    <button class="filter-btn" data-filter="eco">Ecohydrology</button>
    <button class="filter-btn" data-filter="land">Landscape ecology</button>
    <button class="filter-btn" data-filter="standout">Standouts only</button>
  </div>

  <div id="list"></div>
</div>

<script>
const tagLabels = { eco:"Ecohydrology", land:"Landscape ecology", bio:"Biogeochemistry", remote:"Remote sensing", urban:"Urban ecology" };
const tagClass  = { eco:"b-eco", land:"b-land", bio:"b-bio", remote:"b-remote", urban:"b-urban" };

const faculty = [
  { name:"Kelly Caylor", school:"UC Santa Barbara — Geography", ca:true, standout:true, activeRecruiting:false, tags:["eco","land"], focus:"Ecohydrology of drylands, distributed environmental sensing, coupled social-environmental systems", whyFirst:"Your current research mentor. The single most direct relationship you have. If he's open to taking you as a PhD student, this is your #1 application.", approach:"You already have the relationship — this is a conversation about whether he's taking new students and whether he'd support your application. Have that conversation explicitly before anything else.", email:"caylor@ucsb.edu" },
  { name:"Monica Turner", school:"UW-Madison — Integrative Biology", ca:false, standout:true, activeRecruiting:false, tags:["land"], focus:"Landscape ecology, ecosystem ecology, fire dynamics, spatial heterogeneity, land-water interactions", whyFirst:"Wrote the textbook on landscape ecology. National Academy of Sciences member. If landscape ecology is central to your dissertation, no one in the US has more authority in the field.", approach:"Cold email referencing her Yellowstone work and land-water interaction research. Be specific about your landscape ecology angle. She gets a lot of email — make yours unusually focused.", email:"turnermg@wisc.edu" },
  { name:"Julia Jones", school:"Oregon State — Earth, Ocean & Atmospheric Sciences", ca:false, standout:true, activeRecruiting:false, tags:["eco","land"], focus:"Hydrology, landscape ecology, disturbance ecology, biogeochemistry, forest-water interactions", whyFirst:"Decades of forest ecohydrology work at the H.J. Andrews LTER — one of the flagship long-term ecological research sites in the US. One of the most direct faculty matches on your list.", approach:"Reference her work on forest-water interactions and ecohydrological process modeling. Ask about current grad student openings and whether your interests in CA-adjacent forest systems fit her current projects.", email:"julia.jones@oregonstate.edu" },
  { name:"Alexandra Konings", school:"Stanford — Earth System Science", ca:true, standout:true, activeRecruiting:false, tags:["eco","remote"], focus:"Remote sensing ecohydrology, plant water status, vegetation-water feedbacks, drought", whyFirst:"Runs the only lab in the world dedicated specifically to remote sensing ecohydrology at global scale. If you want to do satellite-based vegetation-water work, this is your target.", approach:"Her lab page (koningslab.stanford.edu) lists current openings — check it first. Reference a specific paper (her work on plant hydraulic failure or SMAP vegetation optical depth). Be clear about your methods background.", email:"akonings@stanford.edu" },
  { name:"Christina Tague", school:"UC Santa Barbara — Bren School", ca:true, standout:true, activeRecruiting:false, tags:["eco"], focus:"Ecohydrology, watershed modeling, climate change impacts on water resources", whyFirst:"Developed RHESSys, one of the most widely used landscape-scale watershed ecohydrology models in the world. Same campus as Caylor — a natural co-advisor or committee member.", approach:"Given Caylor is at UCSB, reaching out to Tague is especially strategic — she could serve as a secondary advisor or committee member. Frame it as interest in both the Geography and Bren programs.", email:"tague@bren.ucsb.edu" },
  { name:"David Breshears", school:"University of Arizona — School of Natural Resources", ca:false, standout:true, activeRecruiting:false, tags:["eco","land"], focus:"Dryland ecohydrology, plant-water relations, landscape-scale vegetation change, climate impacts", whyFirst:"One of the most cited dryland ecohydrologists in the world. His 'global change-type drought' framework is foundational. U of A has an explicit Watershed Management & Ecohydrology PhD emphasis.", approach:"Reference his work on landscape-scale vegetation die-off and drought legacy effects. Ask specifically about the Watershed Management & Ecohydrology PhD track and whether he's taking students for that emphasis.", email:"dbreshears@arizona.edu" },
  { name:"Kevin Bladon", school:"Oregon State — Forestry", ca:false, standout:true, activeRecruiting:true, tags:["eco"], focus:"Forest ecohydrology, wildfire impacts on hydrology and water quality, watershed science", whyFirst:"Actively recruiting PhD students (check fews.forestry.oregonstate.edu). Well-funded NSF and USFS projects. Squarely in your subfield — fire-hydrology is directly translatable to CA work.", approach:"His lab page explicitly lists open positions. Email with CV, writing sample, and a specific statement about your interest in fire-hydrology or water quality post-disturbance. He asks for all of this upfront.", email:"kevin.bladon@oregonstate.edu" },
  { name:"Emily Bernhardt", school:"Duke — Nicholas School / Biology", ca:false, standout:true, activeRecruiting:false, tags:["eco","bio"], focus:"Freshwater biogeochemistry, ecohydrology, stream ecology, climate change", whyFirst:"One of the most cited freshwater biogeochemists in the US. Highly active, well-funded lab. If your interests include stream-watershed biogeochemistry alongside hydrology, this is your Duke target.", approach:"Reference her work on stream biogeochemistry and the Duke Forest watershed studies. Be specific about whether your interests lean toward the biogeochemistry side of ecohydrology — that's her main angle.", email:"emily.bernhardt@duke.edu" },
  { name:"M. Todd Walter", school:"Cornell — Biological & Environmental Engineering", ca:false, standout:true, activeRecruiting:false, tags:["eco","bio"], focus:"Ecohydrology, terrestrial biogeochemistry, environmental biophysics, water-climate modeling", whyFirst:"Cornell's leading ecohydrologist. Mentored James Knighton (now at UConn), demonstrating the caliber of his training pipeline. Cross-departmental Graduate Field structure gives you unusual flexibility.", approach:"Reference specific papers — his work on ecohydrological separation or agro-ecology hydrology is distinctive. Make clear you're applying to the Graduate Field, not a specific department. Ask about current lab capacity.", email:"mtw5@cornell.edu" },
  { name:"Jonathan Duncan", school:"Penn State — Ecosystem Science & Management", ca:false, standout:true, activeRecruiting:true, tags:["eco","bio"], focus:"Watershed ecohydrology, biogeochemistry, terrain analysis, water quality, watershed management", whyFirst:"Explicitly recruiting PhD students with active NSF funding. Direct subfield match. One of the clearest 'cold email now' opportunities on this list.", approach:"Email with CV and reference one of his open positions (NSF project on urban watershed biogeochemistry). He asks applicants to state which project they're interested in and include transcripts upfront.", email:"jmduncan@psu.edu" },
  { name:"Nancy Grimm", school:"Arizona State — School of Life Sciences", ca:false, standout:true, activeRecruiting:false, tags:["eco","urban"], focus:"Biogeochemistry, urban ecohydrology, stream-groundwater interactions, climate adaptation in urban systems", whyFirst:"National Academy of Sciences member and one of the world's foremost urban ecosystem ecologists. If urban ecohydrology or the CAP LTER system interests you, she's the person.", approach:"Be honest about whether urban systems are central to your interests — her lab is deeply embedded in the CAP LTER. If that's a fit, reference the long-term dataset and urban-natural systems framing specifically.", email:"nbgrimm@asu.edu" },
  { name:"Ryan Bailey", school:"Colorado State — Ecosystem Science & Sustainability", ca:false, standout:false, activeRecruiting:true, tags:["eco","land"], focus:"Landscape modeling, watershed hydrology, soil-water-vegetation interactions, climate change impacts", whyFirst:"CSU's Watershed Science PhD is one of the few degree programs in the US purpose-built for your interests. Bailey's Landscape Modeling Lab has an open PhD position for August 2026.", approach:"His lab page lists an open position explicitly — apply by Dec 1, 2025. Include a statement of purpose addressing your interests, a CV, and a clear statement of why the Landscape Modeling Lab specifically.", email:"ryan.bailey@colostate.edu" },
  { name:"Dar Roberts", school:"UC Santa Barbara — Geography", ca:true, standout:false, activeRecruiting:false, tags:["land","remote"], focus:"Remote sensing of vegetation, ecology, ecophysiology, spectroscopy", whyFirst:"Same department as Caylor. If your work touches remote sensing or spectral ecology, Roberts is a natural co-advisor or committee member. Strong applied remote sensing capacity.", approach:"Strategic secondary contact alongside Caylor. Frame as interest in co-advised work bridging ecohydrology and remote sensing spectroscopy — that's the natural overlap between their labs.", email:"dar@geog.ucsb.edu" },
  { name:"Greg Okin", school:"UCLA — Geography", ca:true, standout:false, activeRecruiting:false, tags:["eco","land"], focus:"Dryland ecohydrology, dust, aeolian processes, land degradation, remote sensing", whyFirst:"Strong dryland ecohydrology presence at UCLA. Good if your interests span dryland systems and remote sensing-based land degradation.", approach:"Reference his work on dust emissions and dryland ecohydrology feedbacks. Be clear about whether dryland systems are a main interest — his lab has a distinctive aeolian ecology angle.", email:"okin@geog.ucla.edu" },
  { name:"Pamela Templer", school:"Boston University — Biology", ca:false, standout:false, activeRecruiting:false, tags:["eco","bio"], focus:"Ecosystem ecology, biogeochemical cycling, climate change impacts, plant-microbial interactions, urban ecology", whyFirst:"Highly cited ecosystem ecologist. BU's Biogeoscience program is an underrated fit for ecohydrology-biogeochemistry crossover work.", approach:"Reference her work on forest biogeochemistry and climate change — specifically the shift in growing-season dynamics. Be explicit about your interest in the Biogeoscience program's interdisciplinary structure.", email:"ptempler@bu.edu" },
  { name:"Peter McIntyre", school:"Cornell — Natural Resources & the Environment", ca:false, standout:false, activeRecruiting:false, tags:["land","bio"], focus:"Freshwater landscape ecology, limnology, climate change, fish and fisheries, aquatic biogeochemistry", whyFirst:"Strong freshwater landscape ecology presence at Cornell, complementing Walter's ecohydrology angle. Good if your interests include aquatic-terrestrial linkages.", approach:"Reference his freshwater landscape ecology work and ask whether your interests in landscape-watershed dynamics align with current lab directions. A good second contact after Walter.", email:"pbm32@cornell.edu" },
  { name:"Enrique Vivoni", school:"Arizona State — School of Geographical Sciences", ca:false, standout:false, activeRecruiting:false, tags:["eco"], focus:"Dryland ecohydrology, hydrological modeling, land-atmosphere interactions, remote sensing of water cycle", whyFirst:"One of the leading quantitative ecohydrologists working on dryland systems. Strong modeling and remote sensing skill set — good if you want a computational ecohydrology training.", approach:"Reference his work on North American monsoon ecohydrology and distributed hydrologic modeling. Be specific about your interest in process-based modeling vs. field-based approaches.", email:"vivoni@asu.edu" },
  { name:"Joan Iverson Nassauer", school:"University of Michigan — SEAS", ca:false, standout:false, activeRecruiting:false, tags:["land"], focus:"Landscape ecology, watershed infrastructure, urban biodiversity, stormwater, ecological design", whyFirst:"Distinguished landscape ecologist with a unique angle on the design and policy dimensions of landscape patterns. Good if your interests include managed or urban landscapes.", approach:"Reference her work on cultural sustainability of ecological landscapes and stormwater management. Be clear about whether the design-ecology interface interests you.", email:"nassauer@umich.edu" },
  { name:"James Knighton", school:"UConn — Natural Resources & the Environment", ca:false, standout:false, activeRecruiting:true, tags:["eco"], focus:"Ecohydrology, physical hydrology, ecohydrological separation, catchment-scale tree water uptake, isotope hydrology", whyFirst:"Runs a dedicated Ecohydrology Lab at UConn. Active PhD students working directly on ecohydrological topics. A strong likely-admit option with direct subfield match.", approach:"His lab page lists current projects clearly. Reference his work on ecohydrological separation or catchment-scale isotope modeling. Storrs is small — address this honestly if it comes up.", email:"james.knighton@uconn.edu" }
];

function tierOf(f) {
  if (f.standout && f.ca) return "1";
  if (f.standout && f.activeRecruiting) return "1";
  if (f.standout) return "2";
  if (f.activeRecruiting) return "2";
  return "3";
}

const tiers = [
  { key:"1", label:"Contact first — highest priority", rankClass:"rank-1" },
  { key:"2", label:"Contact second — strong matches",  rankClass:"rank-2" },
  { key:"3", label:"Contact third — solid options",    rankClass:"rank-3" }
];

let activeFilter = 'all', openCard = null;

function render() {
  const list = document.getElementById('list');
  const filtered = faculty.filter(f => {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'ca') return f.ca;
    if (activeFilter === 'standout') return f.standout;
    return f.tags.includes(activeFilter);
  });
  if (!filtered.length) { list.innerHTML = '<div class="no-results">No faculty match this filter.</div>'; return; }

  list.innerHTML = '';
  tiers.forEach(tier => {
    const group = filtered.filter(f => tierOf(f) === tier.key);
    if (!group.length) return;

    const sectionEl = document.createElement('div');
    sectionEl.className = 'section-label';
    sectionEl.textContent = tier.label;
    list.appendChild(sectionEl);

    const groupEl = document.createElement('div');
    groupEl.className = 'faculty-list';
    group.forEach((f, i) => {
      const id = `fc-${tier.key}-${i}`;
      const card = document.createElement('div');
      card.className = 'card';
      const extraBadges = [
        f.ca ? '<span class="badge b-ca">California</span>' : '',
        f.standout ? '<span class="badge b-standout">Standout</span>' : '',
        f.activeRecruiting ? '<span class="badge b-active">Actively recruiting</span>' : ''
      ].filter(Boolean).join('');

      card.innerHTML = `
        <div class="card-row" onclick="toggle('${id}')">
          <div class="rank-pill ${tier.rankClass}">${tier.key}</div>
          <div class="card-main">
            <div class="faculty-name">${f.name}</div>
            <div class="faculty-school">${f.school}</div>
            <div class="badges">
              ${f.tags.map(t=>`<span class="badge ${tagClass[t]}">${tagLabels[t]}</span>`).join('')}
              ${extraBadges}
            </div>
          </div>
          <span class="chevron" id="chev-${id}">▶</span>
        </div>
        <div class="card-detail" id="${id}">
          <div class="reason-box">${f.whyFirst}</div>
          <div class="detail-row"><span class="detail-key">Research focus:</span> ${f.focus}</div>
          <div class="detail-row"><span class="detail-key">How to approach:</span> ${f.approach}</div>
          <div class="detail-row"><span class="detail-key">Email:</span> <a href="mailto:${f.email}">${f.email}</a></div>
        </div>`;
      groupEl.appendChild(card);
    });
    list.appendChild(groupEl);
  });
}

function toggle(id) {
  const detail = document.getElementById(id), chev = document.getElementById('chev-'+id);
  const isOpen = detail.classList.contains('open');
  if (openCard && openCard !== id) { document.getElementById(openCard).classList.remove('open'); document.getElementById('chev-'+openCard).classList.remove('open'); }
  detail.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
  openCard = !isOpen ? id : null;
}

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.matches('.filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.dataset.filter;
  openCard = null;
  render();
});

render();
</script>
</body>
</html>
