<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PhD Programs — Environmental Science / Landscape Ecology / Ecohydrology / Climate Change</title>
<link rel="stylesheet" href="style.css">
<style>
  .programs { display: flex; flex-direction: column; gap: 10px; }
  .card-top { display: flex; align-items: flex-start; gap: 10px; justify-content: space-between; }
  .card-left { flex: 1; }
  .school-name { font-size: 15px; font-weight: 500; color: var(--color-text-primary); line-height: 1.3; }
  .program-name { font-size: 12px; color: var(--color-text-secondary); margin-top: 2px; }
  .badges { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 6px; }
  .meta { font-size: 11px; color: var(--color-text-tertiary); white-space: nowrap; padding-top: 2px; flex-shrink: 0; }
  .card.is-standout { border-color: #9FE1CB; border-width: 1.5px; }
  @media (prefers-color-scheme: dark) { .card.is-standout { border-color: #0F6E56; } }
  .faculty-list { display: flex; flex-direction: column; gap: 5px; }
  .faculty-item { font-size: 13px; color: var(--color-text-secondary); line-height: 1.4; }
  .faculty-name { font-weight: 500; color: var(--color-text-primary); }
  .faculty-item.is-standout-faculty .faculty-name { color: #0F6E56; }
  @media (prefers-color-scheme: dark) { .faculty-item.is-standout-faculty .faculty-name { color: #5DCAA5; } }
  .standout-reason { font-size: 12px; color: #0F6E56; margin-top: 3px; font-style: italic; line-height: 1.4; }
  @media (prefers-color-scheme: dark) { .standout-reason { color: #5DCAA5; } }
  @media (max-width: 560px) { .meta { display: none; } }
</style>
</head>
<body>
<div class="page-container">
  <div class="page-header">
    <h1 class="page-title">PhD programs</h1>
    <p class="page-subtitle">Environmental science · Landscape ecology · Ecohydrology · Climate change &nbsp;·&nbsp; Click any card to expand</p>
  </div>

  <div class="filters" id="filters">
    <button class="filter-btn active" data-filter="all">All programs</button>
    <button class="filter-btn" data-filter="standout">Standouts</button>
    <button class="filter-btn" data-filter="ca">California only</button>
    <button class="filter-btn" data-filter="reach">Reach</button>
    <button class="filter-btn" data-filter="target">Target</button>
    <button class="filter-btn" data-filter="safe">Likely</button>
  </div>

  <div class="programs" id="programs"></div>
</div>

<script>
const programs = [
  { school:"Stanford University", program:"PhD in Earth System Science (ESS) or E-IPER", location:"Stanford, CA", tier:"reach", ca:true, standout:false, why:"Stanford's Earth System Science department and E-IPER are elite entry points. ESS explicitly covers water resources, land-use change, landscape evolution, and soil biogeochemistry. Palo Alto is suburban Bay Area — not rural.", fit:"Best fit through ESS for quantitative ecohydrology, or E-IPER to bridge ecology, hydrology, and policy. The Konings Remote Sensing Ecohydrology lab is an exceptional match. Rob Jackson's global change ecology work bridges ecohydrology and climate directly.", faculty:[{ name:"Alexandra Konings", focus:"Remote sensing ecohydrology, plant water status, vegetation-water feedbacks, drought", standout:true, reason:"Runs one of the only labs in the world dedicated to remote sensing ecohydrology at global scale — rare methodological niche with direct climate relevance." },{ name:"Rob Jackson", focus:"Global change ecology, biogeochemistry, carbon and water cycles, dryland ecosystems, climate", standout:false },{ name:"Steven Gorelick", focus:"Hydrology, water resources, ecohydrology, groundwater management", standout:false }] },
  { school:"UC Berkeley", program:"PhD in Environmental Science, Policy & Management (ESPM)", location:"Berkeley, CA", tier:"reach", ca:true, standout:false, why:"The #1-ranked program in environmental sciences globally. Exceptional depth in landscape ecology, biogeochemistry, land-use change, and climate impacts on ecosystems.", fit:"Look at the Ecosystem Ecology & Biogeochemistry and Ecosystem & Social Dynamics divisions. The Mediterranean ecosystem focus is unique and highly relevant to CA landscapes under climate change.", faculty:[{ name:"John Battles", focus:"Forest ecology, landscape disturbance, carbon dynamics, climate impacts", standout:false },{ name:"Whendee Silver", focus:"Ecosystem ecology, soil carbon, biogeochemistry, climate feedbacks", standout:false },{ name:"Matthew Potts", focus:"Land-use change, tropical ecology, conservation", standout:false }] },
  { school:"UCLA", program:"PhD in Environment & Sustainability (IoES)", location:"Los Angeles, CA", tier:"reach", ca:true, standout:false, why:"Interdisciplinary program at the Institute of the Environment & Sustainability. Strong urban ecology and climate change angle. LA fieldwork access to CA chaparral and coast.", fit:"Best if your interests touch on urban landscapes, fire ecology, or the human dimensions of ecohydrology under climate change. Greg Okin's dryland work is highly climate-relevant.", faculty:[{ name:"Thomas Gillespie", focus:"Remote sensing, landscape ecology, biodiversity, climate change", standout:false },{ name:"Greg Okin", focus:"Dryland ecohydrology, dust, land degradation, climate", standout:false },{ name:"Lawren Sack", focus:"Plant ecophysiology, water-use efficiency, climate stress", standout:false }] },
  { school:"UC Irvine", program:"PhD in Earth System Science (ESS) or Ecology & Evolutionary Biology (EEB)", location:"Irvine, CA", tier:"target", ca:true, standout:true, why:"UCI's ESS department is explicitly organized around understanding the causes and implications of climate change, with strong terrestrial ecohydrology and land-atmosphere interaction faculty. Irvine is suburban Orange County — coastal, not rural. Two strong entry points: ESS for climate-ecohydrology, EEB for plant-climate ecology.", fit:"Strong match for climate-landscape-ecohydrology work. Goulden runs the Loma Ridge Global Change Experiment — a long-running climate manipulation in Southern CA grasslands and shrublands, directly relevant to your CA focus. Rigden explicitly lists ecohydrology as a research area. Huxman bridges ecohydrology and plant-climate physiology.", faculty:[{ name:"Michael Goulden", focus:"Terrestrial ecosystem carbon and water fluxes, climate change, fire, Southern CA ecohydrology, eddy covariance", standout:true, reason:"Runs the Loma Ridge Global Change Experiment — a long-term field manipulation in Southern CA ecosystems studying climate and ecohydrology interactions. Actively publishing in 2025 on CA wildfire and forest carbon." },{ name:"Angela Rigden", focus:"Ecohydrology, land-atmosphere interactions, plant physiology, evapotranspiration, climate change, remote sensing", standout:true, reason:"Assistant professor with ecohydrology explicitly in her Google Scholar keywords — one of the few early-career faculty with a direct ecohydrology + climate change + remote sensing profile. Active lab with current PhD students." },{ name:"Travis Huxman", focus:"Plant ecophysiology, ecohydrology, dryland ecosystem function, global change, carbon-water coupling", standout:false },{ name:"James Randerson", focus:"Global carbon cycle, climate-carbon feedbacks, fire, land use change, remote sensing", standout:false }] },
  { school:"UC San Diego / Scripps", program:"PhD in Earth Sciences or Oceanography (SIO)", location:"La Jolla, CA", tier:"reach", ca:true, standout:false, why:"Scripps is one of the most prestigious earth and environmental science institutions in the world. Best for ecohydrology intersecting with climate science, biogeochemistry, or coastal systems.", fit:"More of a stretch — primarily oceanographic and atmospheric. Worth considering if your climate change interest leans toward global biogeochemical cycles or paleoclimate context for modern change.", faculty:[{ name:"Jonathan Sack", focus:"Terrestrial hydrology, climate-vegetation feedbacks", standout:false },{ name:"Jeff Severinghaus", focus:"Paleoclimate, gas-phase biogeochemistry", standout:false }] },
  { school:"Cornell University", program:"PhD in Ecology & Evolutionary Biology (Graduate Field)", location:"Ithaca, NY", tier:"reach", ca:false, standout:false, why:"Cornell's Graduate Field spans 12 departments with unusual cross-disciplinary committee flexibility. Highly competitive but well-funded with 6 years guaranteed support.", fit:"Strong for quantitative ecohydrology and freshwater landscape ecology under climate change. Cross-departmental structure allows working with engineering and biology faculty simultaneously.", faculty:[{ name:"M. Todd Walter", focus:"Ecohydrology, terrestrial biogeochemistry, environmental biophysics, water-climate modeling", standout:true, reason:"Cornell's leading ecohydrologist — James Knighton (UConn) did his PhD under Walter, illustrating the caliber of students his lab produces." },{ name:"Peter McIntyre", focus:"Freshwater landscape ecology, limnology, climate change, aquatic biogeochemistry", standout:false },{ name:"Meredith Holgerson", focus:"Freshwater ecology, pond and lake biogeochemistry, greenhouse gases", standout:false }] },
  { school:"Duke University", program:"PhD in Ecology (UPE) or Nicholas School Earth & Climate Sciences", location:"Durham, NC", tier:"reach", ca:false, standout:false, why:"Duke's UPE and Nicholas School are nationally elite. ECS has explicit watershed ecohydrology and landscape evolution tracks alongside global change ecology.", fit:"Nicholas School covers landscape ecology, wetland ecology, and hydrology of watersheds. The UPE's global-change ecology track is a natural fit for your expanded interests.", faculty:[{ name:"Emily Bernhardt", focus:"Freshwater biogeochemistry, ecohydrology, stream ecology, climate change", standout:true, reason:"One of the most cited freshwater biogeochemists in the US — highly active, well-funded lab with strong ecohydrology and climate overlap." },{ name:"Justin Wright", focus:"Community ecology, plant-soil feedbacks, ecosystem function, climate", standout:false },{ name:"Brian Murray", focus:"Ecosystem services, land-use, natural capital", standout:false }] },
  { school:"Yale School of the Environment", program:"PhD in Ecology & Evolutionary Biology or Forestry & Environmental Studies", location:"New Haven, CT", tier:"reach", ca:false, standout:false, why:"Yale SoE is one of the oldest and most prestigious environmental programs in the US. Strong in global change ecology, water policy, and landscape conservation.", fit:"Best for global-scale landscape change, forest-water interactions, or conservation policy alongside ecohydrology and climate change.", faculty:[{ name:"Peter Raymond", focus:"Freshwater biogeochemistry, carbon cycling, ecohydrology, climate", standout:false },{ name:"Marlyse Duguid", focus:"Forest ecology, land use, landscape history, climate vulnerability", standout:false }] },
  { school:"University of Utah", program:"PhD in Biological Sciences (Ecology & Evolutionary Biology)", location:"Salt Lake City, UT", tier:"target", ca:false, standout:true, why:"The University of Utah is an under-appreciated destination for climate-forest-ecohydrology research. Salt Lake City is a lively mid-size western city — not rural, and geographically close to the western landscape systems most relevant to California. William Anderegg is one of the most decorated young climate ecologists in the world.", fit:"Best fit if climate change impacts on forests, drought mortality, and carbon cycling are central to your interests alongside ecohydrology. Anderegg's lab bridges plant physiology, landscape-scale forest mortality, and climate feedbacks — a distinctive and highly funded niche that complements ecohydrology well.", faculty:[{ name:"William Anderegg", focus:"Climate change and forest ecosystems, drought-induced tree mortality, plant hydraulics, carbon cycling, biosphere-atmosphere feedbacks", standout:true, reason:"Blavatnik National Laureate, NSF Waterman Award winner, 32,000+ Google Scholar citations. One of the most celebrated climate-forest ecologists of his generation. Actively publishing in Nature in 2025." }] },
  { school:"UC Davis", program:"Graduate Group in Ecology (GGE)", location:"Davis, CA", tier:"target", ca:true, standout:false, why:"One of the largest and most comprehensive ecology PhD programs in the US, with an explicit Ecosystems & Landscape Ecology track. Davis is a college town with direct Amtrak access to the Bay Area.", fit:"The GGE offers specializations in ecosystems & landscape ecology, restoration ecology, and global change biology. The Hydrologic Sciences Graduate Group is a parallel ecohydrology-specific option.", faculty:[{ name:"Valerie Eviner", focus:"Grassland ecology, plant-soil-water feedbacks, climate change", standout:false },{ name:"Mark Lubell", focus:"Environmental governance, coupled human-natural systems", standout:false },{ name:"Howard Young (HSGG)", focus:"Watershed hydrology, ecohydrology", standout:false }] },
  { school:"UC Santa Barbara", program:"PhD in Geography OR Bren School Environmental Science & Management", location:"Santa Barbara, CA", tier:"target", ca:true, standout:true, why:"UCSB Geography is arguably the best department in the US for the precise intersection of landscape ecology and ecohydrology. The Bren School adds climate change policy and watershed modeling depth.", fit:"Kelly Caylor is one of the leading ecohydrologists in the world. Christina Tague's RHESSys model is widely used for climate-change watershed projections. Deep GIS and remote sensing capacity throughout.", faculty:[{ name:"Kelly Caylor", focus:"Ecohydrology of drylands, distributed environmental sensing, coupled social-environmental systems", standout:true, reason:"World-class ecohydrologist and your current research mentor — the strongest possible connection you can have to a program." },{ name:"Christina Tague (Bren)", focus:"Ecohydrology, watershed modeling, climate change impacts on water resources", standout:true, reason:"Leading watershed ecohydrology modeler — her RHESSys model is widely used for landscape-scale water balance simulation under climate scenarios." },{ name:"Dar Roberts", focus:"Remote sensing of vegetation, ecology, ecophysiology", standout:false },{ name:"Julien Brun (Bren)", focus:"Ecohydrology, remote sensing, process-based modeling", standout:false }] },
  { school:"University of Washington", program:"PhD in Environmental & Forest Sciences (SEFS)", location:"Seattle, WA", tier:"target", ca:false, standout:false, why:"Seattle-based with extraordinary landscape ecology and climate ecology faculty. The QERM joint program is excellent for computational/modeling approaches. Seattle is a major city.", fit:"Strong Pacific Northwest focus — fire-water-vegetation interactions, riparian ecohydrology, and climate change impacts on forest hydrology. One of the best programs for this combination.", faculty:[{ name:"Christian Torgersen (USGS affiliate)", focus:"Landscape ecology, aquatic/riparian ecology, remote sensing, climate", standout:false },{ name:"Jonathan Bakker", focus:"Plant community ecology, disturbance, restoration, climate change", standout:false }] },
  { school:"UW-Madison", program:"PhD in Ecology & Evolutionary Biology or Integrative Biology", location:"Madison, WI", tier:"target", ca:false, standout:true, why:"UW-Madison has been a national leader in landscape ecology for decades. Madison is a lively, livable college city. The Ecosystem and Landscape Ecology Lab is internationally renowned and has explicit climate-landscape feedbacks research.", fit:"Exceptional for landscape-ecosystem interactions, fire-disturbance dynamics, and land-water connections under climate change. Access to Yellowstone LTER, Coweeta LTER, and the Center for Limnology.", faculty:[{ name:"Monica Turner", focus:"Landscape ecology, ecosystem ecology, fire dynamics, spatial heterogeneity, land-water interactions, climate change", standout:true, reason:"Literally wrote the textbook on landscape ecology. National Academy of Sciences member. Past president of the Ecological Society of America. The most prominent landscape ecologist in the US." },{ name:"Philip Townsend", focus:"Remote sensing of forest ecosystems, spectroscopy, landscape ecology, forest disturbance, carbon and water cycling", standout:false }] },
  { school:"Oregon State University", program:"PhD in Environmental Sciences or Forestry (Water Resources Graduate Program)", location:"Corvallis, OR", tier:"target", ca:false, standout:true, why:"OSU has dedicated ecohydrology and Forest Ecohydrology & Watershed Science labs, plus exceptional access to the H.J. Andrews LTER. Corvallis is 90 miles from Portland.", fit:"Among the best programs in the country for forest hydrology and the ecology-hydrology interface under climate change. Pacific Northwest fire-hydrology-vegetation systems directly parallel CA landscapes.", faculty:[{ name:"Julia Jones", focus:"Hydrology, landscape ecology, disturbance ecology, biogeochemistry, forest-water interactions, climate change", standout:true, reason:"One of the foremost forest ecohydrologists in the US, with decades of work at the H.J. Andrews LTER. Her research on forest-water interactions under climate change is directly relevant." },{ name:"Kevin Bladon", focus:"Forest ecohydrology, wildfire impacts on hydrology and water quality, watershed science", standout:true, reason:"Leads the Forest Ecohydrology and Watershed Science (FEWS) Lab — actively recruiting PhD students, well-funded, squarely in your subfield." },{ name:"Carlos Ochoa", focus:"Rangeland ecohydrology, watershed-riparian systems, surface and groundwater interactions", standout:false }] },
  { school:"Colorado State University", program:"PhD in Watershed Science or Graduate Degree Program in Ecology", location:"Fort Collins, CO", tier:"target", ca:false, standout:false, why:"CSU has a dedicated PhD in Watershed Science and an active GDPE team researching Rocky Mountain forest-water-climate interactions. Fort Collins is a mid-size city adjacent to the Rockies.", fit:"The GDPE faculty are investigating how changes in forest landscapes of the Rocky Mountains impact water resources across the Colorado River Basin under climate change — a direct match for your expanded interests.", faculty:[{ name:"Ryan Bailey", focus:"Landscape modeling, watershed hydrology, soil-water-vegetation interactions, climate change", standout:false },{ name:"Anping Chen", focus:"Ecosystem ecology, global change, remote sensing of terrestrial ecosystems", standout:false },{ name:"Troy Ocheltree", focus:"Plant physiology, water use, ecohydrology of grasslands and forests, climate stress", standout:false }] },
  { school:"Penn State University", program:"PhD in Ecology (Intercollege) or Ecosystem Science & Management", location:"State College, PA", tier:"target", ca:false, standout:false, why:"Penn State's Ecology intercollege program draws from multiple departments with active faculty in watershed ecohydrology and biogeochemistry. Strong LTER and federal agency connections.", fit:"Jonathan Duncan's Watershed Ecohydrology & Biogeochemistry Lab has active NSF funding and is explicitly recruiting PhD students in catchment-scale nutrient cycling and forest-water interactions.", faculty:[{ name:"Jonathan Duncan", focus:"Watershed ecohydrology, biogeochemistry, terrain analysis, water quality, watershed management", standout:true, reason:"Runs a dedicated Watershed Ecohydrology & Biogeochemistry Lab with active NSF funding and open PhD positions — one of the most direct faculty matches on this list." },{ name:"Jason Kaye", focus:"Forest ecology, soil biogeochemistry, carbon and nitrogen cycling, climate", standout:false },{ name:"Lauren McPhillips", focus:"Urban ecohydrology, stormwater, green infrastructure, hydrology-biogeochemistry", standout:false }] },
  { school:"University of Michigan (SEAS)", program:"PhD in Resource Ecology Management", location:"Ann Arbor, MI", tier:"target", ca:false, standout:false, why:"Michigan's SEAS is one of the oldest and most respected environmental schools in the country. Ann Arbor is a lively, livable mid-size college city.", fit:"The Resource Ecology Management track is purpose-built for natural science PhDs. Strong in landscape ecology, Great Lakes watershed science, conservation GIS, and climate change adaptation.", faculty:[{ name:"Drew Gronewold", focus:"Hydrological modeling, Great Lakes water resources, watershed-scale forecasting, climate change", standout:false },{ name:"Joan Iverson Nassauer", focus:"Landscape ecology, watershed infrastructure, urban biodiversity, stormwater, ecological design", standout:false },{ name:"Derek Van Berkel", focus:"Land use science, coupled natural-human systems, geovisualization, spatial ecology", standout:false }] },
  { school:"Boston University", program:"PhD in Earth & Environment (Biogeoscience Program)", location:"Boston, MA", tier:"target", ca:false, standout:false, why:"BU's Biogeoscience program explicitly lists ecohydrology as a core theme alongside biogeochemistry, hydrology, geomorphology, and remote sensing. A genuine sleeper pick with real depth.", fit:"Best for bridging ecohydrology with global change biology, land-atmosphere interactions, or remote sensing at landscape scales under climate change.", faculty:[{ name:"Pamela Templer", focus:"Ecosystem ecology, biogeochemical cycling, climate change impacts, plant-microbial interactions", standout:false },{ name:"Mark Friedl", focus:"Remote sensing, land cover change, land-atmosphere interactions, global change", standout:false },{ name:"Christoph Nolte", focus:"Conservation science, land protection effectiveness, remote sensing, spatial data science", standout:false }] },
  { school:"University of Arizona", program:"PhD in Natural Resources — Watershed Management & Ecohydrology emphasis", location:"Tucson, AZ", tier:"target", ca:false, standout:true, why:"One of the only PhD programs in the US with an explicit Watershed Management and Ecohydrology emphasis. Tucson is a mid-size city. Sonoran Desert context is highly relevant to Southern CA systems and climate change trajectories.", fit:"Exceptional for dryland and semi-arid ecohydrology, fire-hydrology interactions, and water-limited landscape responses to climate change. Access to the USDA Southwest Watershed Research Center.", faculty:[{ name:"David Breshears", focus:"Dryland ecohydrology, plant-water relations, landscape-scale vegetation change, drought, climate impacts", standout:true, reason:"One of the most cited dryland ecohydrologists globally — his work on 'global change-type drought' and vegetation die-off is foundational to the field." },{ name:"Paul Brooks", focus:"Watershed hydrology, snowmelt, biogeochemistry, water resources, climate change", standout:false }] },
  { school:"Arizona State University", program:"PhD in Environmental Life Sciences or Sustainability", location:"Tempe/Phoenix, AZ", tier:"target", ca:false, standout:false, why:"ASU's strength is urban ecohydrology, dryland biogeochemistry, and climate adaptation. Phoenix metro is obviously non-rural. Best if your interests include urban landscapes, semi-arid systems, or coupled social-ecological systems.", fit:"Strong for urban ecology, stream biogeochemistry, coupled human-natural systems, and climate change adaptation. The CAP LTER is one of the most data-rich urban ecological research programs in the world.", faculty:[{ name:"Nancy Grimm", focus:"Biogeochemistry, urban ecohydrology, stream-groundwater interactions, climate adaptation in urban systems", standout:true, reason:"National Academy of Sciences member and one of the world's foremost urban ecosystem ecologists. Decades of work on stream biogeochemistry and urban water systems." },{ name:"Enrique Vivoni", focus:"Dryland ecohydrology, hydrological modeling, land-atmosphere interactions, climate change", standout:false },{ name:"Daniel Childers", focus:"Wetland and urban ecosystem ecology, biogeochemistry, ecosystem services, climate", standout:false }] },
  { school:"UC Riverside", program:"PhD in Environmental Sciences", location:"Riverside, CA", tier:"safe", ca:true, standout:false, why:"Strong program with excellent faculty in dryland ecology, soil-water dynamics, and climate change. Solid, funded option — Riverside is part of the Inland Empire metro, not rural.", fit:"Good fit for dryland and arid/semi-arid ecohydrology, fire ecology in southern CA, or climate change impacts on water resources.", faculty:[{ name:"Emma Aronson", focus:"Soil microbial ecology, dust, dryland ecosystems, climate change", standout:false },{ name:"Nigel Tapper", focus:"Urban microclimate, water and energy fluxes", standout:false }] },
  { school:"UConn", program:"PhD in Natural Resources & the Environment", location:"Storrs, CT", tier:"safe", ca:false, standout:false, why:"UConn NRE directly lists ecohydrology, landscape ecology, remote sensing, and geospatial analytics as mentorship areas. Competitive funding. Note: Storrs is a college town — check if that's workable for you.", fit:"Strong for watershed hydrology, forest-water interactions, and applied landscape ecology under climate change. Active ecohydrology lab with current PhD students.", faculty:[{ name:"James Knighton", focus:"Ecohydrology, physical hydrology, ecohydrological separation, catchment-scale tree water uptake, hydrologic modeling, climate change", standout:false },{ name:"Beth Lawrence", focus:"Coastal salt marsh restoration, wetland biogeochemistry, climate vulnerability", standout:false }] }
];

let activeFilter = 'all', openCard = null;

function renderPrograms() {
  const container = document.getElementById('programs');
  const filtered = programs.filter(p => {
    if (activeFilter === 'all') return true;
    if (activeFilter === 'standout') return p.standout || p.faculty.some(f => f.standout);
    if (activeFilter === 'ca') return p.ca;
    return p.tier === activeFilter;
  });
  if (!filtered.length) { container.innerHTML = '<div class="no-results">No programs match this filter.</div>'; return; }
  container.innerHTML = '';
  const tierLabels = { reach:'Reach', target:'Target', safe:'Likely admit' };
  const tierClass  = { reach:'b-reach', target:'b-target', safe:'b-safe' };
  filtered.forEach((p, i) => {
    const id = 'card-' + i;
    const hasStandout = p.standout || p.faculty.some(f => f.standout);
    const card = document.createElement('div');
    card.className = 'card' + (hasStandout ? ' is-standout' : '');
    card.innerHTML = `
      <div class="card-top" onclick="toggle('${id}')">
        <div class="card-left">
          <div class="school-name">${p.school}</div>
          <div class="program-name">${p.program}</div>
          <div class="badges">
            <span class="badge ${tierClass[p.tier]}">${tierLabels[p.tier]}</span>
            <span class="badge ${p.ca?'b-ca':'b-us'}">${p.ca?'California':'Out of state'}</span>
            ${hasStandout?'<span class="badge b-standout">Standout</span>':''}
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;flex-shrink:0">
          <span class="meta">${p.location}</span>
          <span class="chevron" id="chev-${id}">▶</span>
        </div>
      </div>
      <div class="card-detail" id="${id}">
        <div class="detail-section"><div class="detail-label">Why this program</div><div class="detail-text">${p.why}</div></div>
        <div class="detail-section"><div class="detail-label">Fit for your interests</div><div class="detail-text">${p.fit}</div></div>
        <div class="detail-section">
          <div class="detail-label">Faculty to research</div>
          <div class="faculty-list">
            ${p.faculty.map(f=>`<div class="faculty-item${f.standout?' is-standout-faculty':''}"><span class="faculty-name">${f.name}${f.standout?' ✦':''}</span> — ${f.focus}${f.standout&&f.reason?`<div class="standout-reason">${f.reason}</div>`:''}</div>`).join('')}
          </div>
        </div>
      </div>`;
    container.appendChild(card);
  });
}

function toggle(id) {
  const detail = document.getElementById(id), chev = document.getElementById('chev-'+id);
  const isOpen = detail.classList.contains('open');
  if (openCard && openCard !== id) { document.getElementById(openCard).classList.remove('open'); document.getElementById('chev-'+openCard).classList.remove('open'); }
  detail.classList.toggle('open', !isOpen);
  chev.classList.toggle('open', !isOpen);
  openCard = !isOpen ? id : null;
}

document.getElementById('filters').addEventListener('click', e => {
  if (!e.target.matches('.filter-btn')) return;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  activeFilter = e.target.dataset.filter;
  openCard = null;
  renderPrograms();
});

renderPrograms();
</script>
</body>
</html>
